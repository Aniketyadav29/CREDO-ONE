<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="node1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="node2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="node3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="node4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="node5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#93c5fd"/>
    </marker>
    <style>
      .title { font: 700 34px Segoe UI, Arial, sans-serif; fill: #f8fafc; }
      .h { font: 700 26px Segoe UI, Arial, sans-serif; fill: #ffffff; }
      .p { font: 500 17px Segoe UI, Arial, sans-serif; fill: #e2e8f0; }
      .num { font: 800 28px Segoe UI, Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #93c5fd; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1450" cy="120" r="180" fill="#38bdf8" opacity="0.10"/>
  <circle cx="160" cy="760" r="220" fill="#6366f1" opacity="0.12"/>

  <text x="800" y="64" text-anchor="middle" class="title">AI-Assisted Underwriting Lifecycle | Professional Flow</text>

  <g filter="url(#shadow)">
    <rect x="110" y="140" width="1380" height="110" rx="20" fill="url(#node1)"/>
    <text x="170" y="205" class="num">1</text>
    <text x="240" y="190" class="h">Real-Time Applicant Risk Profiling Stage</text>
    <text x="240" y="220" class="p">User submits financial and behavioral signals for risk scoring.</text>

    <rect x="110" y="285" width="1380" height="110" rx="20" fill="url(#node2)"/>
    <text x="170" y="350" class="num">2</text>
    <text x="240" y="335" class="h">Risk Scoring and Decision Support Request Stage</text>
    <text x="240" y="365" class="p">Frontend structures payload and sends decision support request to backend API.</text>

    <rect x="110" y="430" width="1380" height="110" rx="20" fill="url(#node3)"/>
    <text x="170" y="495" class="num">3</text>
    <text x="240" y="480" class="h">Compliance-Ready Decision Audit Trail Stage</text>
    <text x="240" y="510" class="p">FastAPI validates schema and creates traceable request flow for model execution.</text>

    <rect x="110" y="575" width="1380" height="110" rx="20" fill="url(#node4)"/>
    <text x="170" y="640" class="num">4</text>
    <text x="240" y="625" class="h">Explainable Lending Decision Engine Stage</text>
    <text x="240" y="655" class="p">Engine returns prediction, explanation, and governance-aware decision narrative.</text>

    <rect x="110" y="720" width="1380" height="110" rx="20" fill="url(#node5)"/>
    <text x="170" y="785" class="num">5</text>
    <text x="240" y="770" class="h">Human-in-the-Loop Approval Workflow Stage</text>
    <text x="240" y="800" class="p">Frontend renders decision output, profiling graph, and officer-friendly explanation.</text>
  </g>

  <line x1="800" y1="250" x2="800" y2="285" class="arrow"/>
  <line x1="800" y1="395" x2="800" y2="430" class="arrow"/>
  <line x1="800" y1="540" x2="800" y2="575" class="arrow"/>
  <line x1="800" y1="685" x2="800" y2="720" class="arrow"/>
</svg>
