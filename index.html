<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroRisk AI | Premium Lending Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto mt-10">
        <div class="glass-panel rounded-[2rem] p-10">
            <div class="flex items-center gap-4 mb-10">
                <div class="h-12 w-12 bg-black rounded-2xl flex items-center justify-center">
                    <div class="h-5 w-5 border-2 border-white rounded-full"></div>
                </div>
                <h1 class="text-3xl font-bold tracking-tight text-gray-900">MicroRisk <span class="text-gray-400">AI</span></h1>
            </div>

            <form id="loanForm" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Income (Annual)</label>
                        <input type="number" name="person_income" required class="w-full bg-transparent border-b-2 border-gray-200 focus:border-black transition-colors py-2 outline-none text-lg">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Loan Requested</label>
                        <input type="number" name="loan_amnt" required class="w-full bg-transparent border-b-2 border-gray-200 focus:border-black transition-colors py-2 outline-none text-lg">
                    </div>
                </div>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Interest Rate (%)</label>
                        <input type="number" step="0.1" name="loan_int_rate" required class="w-full bg-transparent border-b-2 border-gray-200 focus:border-black transition-colors py-2 outline-none text-lg">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Loan Intent</label>
                        <select name="loan_intent" class="w-full bg-transparent border-b-2 border-gray-200 focus:border-black py-2 outline-none">
                            <option value="EDUCATION">Education</option>
                            <option value="MEDICAL">Medical</option>
                            <option value="VENTURE">Venture</option>
                        </select>
                    </div>
                </div>

                <input type="hidden" name="person_age" value="25">
                <input type="hidden" name="person_emp_length" value="3">
                <input type="hidden" name="loan_percent_income" value="0.1">
                <input type="hidden" name="person_home_ownership" value="RENT">
                <input type="hidden" name="repayment_history" value="good">
                <input type="hidden" name="loan_purpose_category" value="productive_asset">

                <button type="submit" class="md:col-span-2 bg-black text-white rounded-2xl py-5 font-bold hover:opacity-90 transition-opacity mt-4">
                    Generate AI Risk Profile
                </button>
            </form>

            <div id="results" class="hidden mt-12 p-8 rounded-3xl bg-white border border-gray-100 shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="riskStatus" class="text-2xl font-bold"></h2>
                    <div id="riskIndicator" class="h-4 w-4 rounded-full"></div>
                </div>
                <p id="riskSummary" class="text-gray-600 leading-relaxed"></p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loanForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const formData = Object.fromEntries(new FormData(form));
            
            const response = await fetch('/api/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });
            
            const result = await response.json();
            const resultsDiv = document.getElementById('results');
            resultsDiv.classList.remove('hidden');
            
            document.getElementById('riskStatus').innerText = result.prediction === 0 ? "Approved" : "High Risk Alert";
            document.getElementById('riskIndicator').className = result.prediction === 0 ? "h-4 w-4 rounded-full bg-green-500" : "h-4 w-4 rounded-full bg-red-500";
            document.getElementById('riskSummary').innerText = result.reason.summary;
        };
    </script>
</body>
</html>
