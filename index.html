<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroRisk AI | Financial Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        body {
            background: radial-gradient(circle at top right, #6366f1, transparent),
                        radial-gradient(circle at bottom left, #a855f7, transparent),
                        #f9fafb;
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex items-center justify-center p-6">
    <div class="max-w-4xl w-full glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
        <div class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">MicroRisk <span class="text-indigo-600">AI</span></h1>
            <p class="text-gray-600 mt-2 font-medium">Advanced Loan Risk Diagnostics</p>
        </div>

        <div class="grid md:grid-cols-2 gap-10">
            <form id="riskForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">Annual Income (₹)</label>
                    <input type="number" name="person_income" required class="w-full bg-white/50 border-none rounded-2xl px-4 py-4 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">Loan Amount (₹)</label>
                    <input type="number" name="loan_amnt" required class="w-full bg-white/50 border-none rounded-2xl px-4 py-4 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">Interest Rate (%)</label>
                    <input type="number" step="0.1" name="loan_int_rate" required class="w-full bg-white/50 border-none rounded-2xl px-4 py-4 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">Loan Purpose</label>
                    <select name="loan_intent" class="w-full bg-white/50 border-none rounded-2xl px-4 py-4 outline-none">
                        <option value="EDUCATION">Education</option>
                        <option value="MEDICAL">Medical</option>
                        <option value="VENTURE">Business Venture</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl shadow-lg transition-transform active:scale-95">
                    Analyze Patterns
                </button>
            </form>

            <div id="resultArea" class="hidden flex flex-col justify-center text-center p-8 bg-white/60 rounded-[2rem] border border-white/50 shadow-inner">
                <div id="riskIcon" class="text-6xl mb-4"></div>
                <h3 id="riskLabel" class="text-3xl font-black mb-4"></h3>
                <p id="riskSummary" class="text-gray-700 leading-relaxed"></p>
                <div class="mt-6 p-4 bg-white/40 rounded-xl text-xs text-gray-500 text-left overflow-auto max-h-32 italic" id="riskDetail"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('riskForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = Object.fromEntries(new FormData(e.target));
            const resultArea = document.getElementById('resultArea');
            
            const response = await fetch('/api/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });
            const data = await response.json();

            resultArea.classList.remove('hidden');
            const isSafe = data.prediction === 0;
            
            document.getElementById('riskIcon').innerText = isSafe ? "🛡️" : "⚠️";
            document.getElementById('riskLabel').innerText = isSafe ? "APPROVED" : "REJECTED";
            document.getElementById('riskLabel').className = `text-3xl font-black mb-4 ${isSafe ? 'text-emerald-600' : 'text-rose-600'}`;
            document.getElementById('riskSummary').innerText = data.reason.summary;
            document.getElementById('riskDetail').innerText = data.reason.detailed_breakdown;
        };
    </script>
</body>
</html>
