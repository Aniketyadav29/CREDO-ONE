<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroRisk AI - Loan Prediction</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }

        h2 { color: #1e293b; margin-bottom: 20px; text-align: center; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #475569; }
        
        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* --- CUSTOM RADIO CIRCLES START --- */
        .radio-container {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }

        .custom-radio {
            display: flex;
            align-items: center;
            cursor: pointer;
            position: relative;
            padding-left: 28px;
            font-size: 14px;
        }

        .custom-radio input {
            position: absolute;
            opacity: 0; /* Hide default */
        }

        .checkmark {
            position: absolute;
            left: 0;
            height: 20px;
            width: 20px;
            background-color: #fff;
            border: 2px solid #cbd5e1;
            border-radius: 50%; /* Make it circle */
        }

        .custom-radio:hover input ~ .checkmark { background-color: #f1f5f9; }

        .custom-radio input:checked ~ .checkmark {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            top: 5px;
            left: 5px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: white;
        }

        .custom-radio input:checked ~ .checkmark:after { display: block; }
        /* --- CUSTOM RADIO CIRCLES END --- */

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover { background-color: #1d4ed8; }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }

        .risk-high { background-color: #fee2e2; border: 1px solid var(--danger); color: var(--danger); }
        .risk-low { background-color: #dcfce7; border: 1px solid var(--success); color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <h2>🏦 MicroRisk AI</h2>
    <form id="loanForm">
        <div class="form-group">
            <label>Monthly Income ($)</label>
            <input type="number" id="person_income" required placeholder="e.g. 5000">
        </div>

        <div class="form-group">
            <label>Loan Amount ($)</label>
            <input type="number" id="loan_amnt" required placeholder="e.g. 20000">
        </div>

        <div class="form-group">
            <label>Interest Rate (%)</label>
            <input type="number" step="0.1" id="loan_int_rate" required placeholder="e.g. 10.5">
        </div>

        <div class="form-group">
            <label>Home Ownership</label>
            <div class="radio-container">
                <label class="custom-radio">
                    <input type="radio" name="home" value="RENT" checked>
                    <span class="checkmark"></span> Rent
                </label>
                <label class="custom-radio">
                    <input type="radio" name="home" value="OWN">
                    <span class="checkmark"></span> Own
                </label>
                <label class="custom-radio">
                    <input type="radio" name="home" value="MORTGAGE">
                    <span class="checkmark"></span> Mortgage
                </label>
            </div>
        </div>

        <div class="form-group">
            <label>Loan Intent</label>
            <select id="loan_intent">
                <option value="PERSONAL">Personal</option>
                <option value="EDUCATION">Education</option>
                <option value="MEDICAL">Medical</option>
                <option value="VENTURE">Venture</option>
            </select>
        </div>

        <button type="submit" id="submitBtn">Predict Risk</button>
    </form>

    <div id="result"></div>
</div>

<script>
    document.getElementById('loanForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const resDiv = document.getElementById('result');
        
        btn.innerText = "Analyzing...";
        btn.disabled = true;

        const formData = {
            person_income: parseInt(document.getElementById('person_income').value),
            loan_amnt: parseInt(document.getElementById('loan_amnt').value),
            loan_int_rate: parseFloat(document.getElementById('loan_int_rate').value),
            loan_intent: document.getElementById('loan_intent').value,
            person_home_ownership: document.querySelector('input[name="home"]:checked').value
        };

        try {
            const response = await fetch('/api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            const data = await response.json();
            
            resDiv.style.display = "block";
            resDiv.className = data.risk_score === "High Risk" ? "risk-high" : "risk-low";
            
            resDiv.innerHTML = `
                <strong>Prediction: ${data.risk_score}</strong><br>
                <small>${data.reason.summary}</small><br><br>
                <p>${data.overall_conclusion}</p>
            `;
        } catch (error) {
            alert("Error connecting to server!");
        } finally {
            btn.innerText = "Predict Risk";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
