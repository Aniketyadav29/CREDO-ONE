<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroRisk AI | Decorated Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.82/build/spline-viewer.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Attractive Animated Gradient Background */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background: linear-gradient(-45deg, #6366f1, #a855f7, #ec4899, #22d3ee);
            background-size: 400% 400%;
            animation: gradient-animation 15s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradient-animation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Effect for Tiles */
        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        /* Floating 3D Decorative Logos */
        .floating-3d {
            position: fixed;
            z-index: -1;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.2));
            animation: float-slow 8s infinite ease-in-out;
        }

        @keyframes float-slow {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }
    </style>
</head>
<body class="p-4 lg:p-8">

    <img src="https://cdn3d.iconscout.com/3d/premium/thumb/coin-4035925-3342600.png" class="floating-3d w-24 top-10 left-10">
    <img src="https://cdn3d.iconscout.com/3d/premium/thumb/credit-card-4035919-3342594.png" class="floating-3d w-48 bottom-10 right-10" style="animation-delay: -2s;">

    <div class="max-w-7xl mx-auto relative z-10">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-white glass rounded-2xl flex items-center justify-center p-1 overflow-hidden">
                    <spline-viewer url="https://prod.spline.design/6Wq1Q7YAnWbnInm6/scene.splinecode" class="w-full h-full"></spline-viewer>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold text-gray-900 tracking-tighter">MicroRisk <span class="text-indigo-600">AI</span></h1>
                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Full Condition Analysis v2.5</p>
                </div>
            </div>
            <div class="glass px-6 py-2 rounded-2xl text-xs font-bold text-gray-600 flex items-center gap-3">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
                System Status: Live & Encrypted
            </div>
        </header>

        <form id="loanForm" class="grid lg:grid-cols-4 gap-6">
            
            <div class="lg:col-span-1 glass rounded-[2.5rem] p-8 space-y-6">
                <h3 class="flex items-center gap-2 text-xs font-black text-gray-400 uppercase tracking-widest"><i data-lucide="user"></i> Personal Profile</h3>
                <div class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 ml-1">Applicant Age</label>
                        <input type="number" name="person_age" value="21" class="w-full bg-white/50 border-0 rounded-xl px-4 py-3 font-bold text-gray-700">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 ml-1">Employment (Years)</label>
                        <input type="number" name="person_emp_length" value="5" class="w-full bg-white/50 border-0 rounded-xl px-4 py-3 font-bold text-gray-700">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 ml-1">Home Status</label>
                        <select name="person_home_ownership" class="w-full bg-white/50 border-0 rounded-xl px-4 py-3 font-bold text-gray-700">
                            <option value="RENT">Rent</option>
                            <option value="MORTGAGE">Mortgage</option>
                            <option value="OWN">Own</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1 glass rounded-[2.5rem] p-8 space-y-6">
                <h3 class="flex items-center gap-2 text-xs font-black text-gray-400 uppercase tracking-widest"><i data-lucide="banknote"></i> Financials</h3>
                <div class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 ml-1">Annual Income (₹)</label>
                        <input type="number" name="person_income" value="9600" class="w-full bg-indigo-50/50 border-0 rounded-xl px-4 py-3 font-bold text-indigo-600">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 ml-1">Loan Amount (₹)</label>
                        <input type="number" name="loan_amnt" value="1000" class="w-full bg-white/50 border-0 rounded-xl px-4 py-3 font-bold text-gray-700">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 ml-1">Interest Rate (%)</label>
                        <input type="number" step="0.1" name="loan_int_rate" value="12.9" class="w-full bg-white/50 border-0 rounded-xl px-4 py-3 font-bold text-gray-700">
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 glass rounded-[2.5rem] p-8 flex flex-col justify-between">
                <div class="grid grid-cols-2 gap-8 mb-6">
                    <div class="space-y-4">
                        <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest">Loan Context</h3>
                        <select name="loan_intent" class="w-full bg-white/50 border-0 rounded-xl px-4 py-3 font-bold">
                            <option value="EDUCATION">Education</option>
                            <option value="MEDICAL">Medical</option>
                            <option value="VENTURE">Venture</option>
                        </select>
                        <select name="loan_purpose_category" class="w-full bg-white/50 border-0 rounded-xl px-4 py-3 font-bold text-gray-700">
                            <option value="productive_asset">Productive Asset</option>
                            <option value="emergency_need">Emergency Need</option>
                        </select>
                    </div>
                    <div class="space-y-4">
                        <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest">Credit History</h3>
                        <select name="repayment_history" class="w-full bg-white/50 border-0 rounded-xl px-4 py-3 font-bold text-emerald-600">
                            <option value="good">Good</option>
                            <option value="fair">Fair</option>
                            <option value="poor">Poor</option>
                        </select>
                        <div class="bg-gray-100/50 rounded-xl p-3 text-[10px] font-bold text-gray-400">
                            Burden Ratio (Auto): <span class="text-gray-700">0.1</span>
                            <input type="hidden" name="loan_percent_income" value="0.1">
                        </div>
                    </div>
                </div>
                <button type="submit" id="submitBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-2xl shadow-xl transition-all active:scale-95 uppercase tracking-widest">
                    Launch AI Analysis
                </button>
            </div>
        </form>

        <div id="results" class="hidden mt-8 grid lg:grid-cols-12 gap-6 animate-in slide-in-from-bottom duration-700">
            <div id="statusCard" class="lg:col-span-4 rounded-[3rem] p-12 text-white flex flex-col items-center justify-center text-center shadow-2xl">
                <div class="mb-6 animate-bounce">
                    <img id="verdict3DIcon" src="https://cdn3d.iconscout.com/3d/premium/thumb/shield-check-4035928-3342603.png" class="w-32 h-32">
                </div>
                <h2 id="statusTitle" class="text-6xl font-black italic tracking-tighter mb-1 uppercase"></h2>
                <p id="statusSub" class="font-bold text-[10px] tracking-widest opacity-80 uppercase"></p>
            </div>

            <div class="lg:col-span-5 glass rounded-[3rem] p-10 space-y-6">
                <div>
                    <span class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">AI Intelligence Summary</span>
                    <p id="summaryText" class="text-gray-800 font-bold leading-relaxed mt-2 text-lg italic"></p>
                </div>
                <div class="h-px bg-gray-100"></div>
                <div class="flex items-center gap-6">
                    <div class="h-24 w-24">
                        <canvas id="ratioChart"></canvas>
                    </div>
                    <div class="text-[10px] text-gray-400 font-bold leading-tight uppercase">Loan vs<br>Income Ratio</div>
                </div>
            </div>

            <div class="lg:col-span-3 glass rounded-[3rem] p-6 flex flex-col items-center justify-center">
                 <img src="https://cdn3d.iconscout.com/3d/premium/thumb/bank-building-4035914-3342589.png" class="w-full max-w-[150px] animate-pulse">
                 <p class="text-[10px] font-black text-gray-400 uppercase mt-4">Verified Financial Node</p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let myChart;

        const form = document.getElementById('loanForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = `<span class="animate-pulse">ANALYZING DATA...</span>`;
            
            const formData = Object.fromEntries(new FormData(form));
            const response = await fetch('/api/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });
            const data = await response.json();
            
            document.getElementById('results').classList.remove('hidden');
            const isSafe = data.prediction === 0;
            
            const card = document.getElementById('statusCard');
            card.className = isSafe ? "lg:col-span-4 rounded-[3rem] p-12 bg-emerald-500 text-white shadow-2xl shadow-emerald-200" 
                                    : "lg:col-span-4 rounded-[3rem] p-12 bg-rose-500 text-white shadow-2xl shadow-rose-200";
            
            document.getElementById('statusTitle').innerText = isSafe ? "Safe" : "Risk";
            document.getElementById('statusSub').innerText = isSafe ? "Approval Recommended" : "Warning: Potential Default";
            document.getElementById('verdict3DIcon').src = isSafe 
                ? "https://cdn3d.iconscout.com/3d/premium/thumb/shield-check-4035928-3342603.png" 
                : "https://cdn3d.iconscout.com/3d/premium/thumb/alert-4035921-3342596.png";

            document.getElementById('summaryText').innerText = data.reason.summary;
            
            updateChart(formData.person_income, formData.loan_amnt);
            btn.innerHTML = `Launch AI Analysis`;
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        };

        function updateChart(income, loan) {
            const ctx = document.getElementById('ratioChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [income - loan, loan],
                        backgroundColor: ['#e2e8f0', '#6366f1'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }
    </script>
</body>
</html>
